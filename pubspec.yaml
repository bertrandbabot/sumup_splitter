name: sumup_ticket_splitter
description: Flutter app that watches SumUp POS transactions and prints one ticket per product_summary item.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.2.3
  esc_pos_utils_plus: ^2.0.4
  intl: ^0.19.0
  charset_converter: ^2.3.0
  flutter_foreground_task: ^8.17.0
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
